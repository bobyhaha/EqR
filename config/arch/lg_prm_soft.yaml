name: lg_prm@LGPRMSoftModel
short_name: LG-PRM-Soft
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy
  proposal_diversity_weight: 0.01
  proposal_entropy_weight: 0.001
  proposal_load_balance_weight: 0.01
  library_entropy_weight: 0.001

halt_exploration_prob: 0.1
halt_max_steps: 16

hidden_size: 264
num_heads: 8
pos_encodings: rope2d
expansion: 4
forward_dtype: bfloat16

n_explorers: 10
explorer_mult: 0.5
pi_layers: 2
lg_steps: 4
library_size: 512
rag_library_size: 512
mlp_library_mult: 4
gate_threshold: 0.5
straight_through_gate: true
forced_library: false
proposal_pool: concat
recurrent_update: residual
phd_lambda: 0.95
phd_noise_scale: 0.0
H_init_std: 1.0
L_init_std: 1.0
